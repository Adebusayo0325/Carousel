# docker-compose.prod.yml — production (pre-built images, no source mounts)
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apexmint}
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { cpus: "2", memory: "2G" }

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      replicas: 2
      resources:
        limits: { cpus: "1", memory: "1G" }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }

  worker:
    build:
      context: .
      target: worker
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      WORKER_CONCURRENCY: "10"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      replicas: 1
      resources:
        limits: { cpus: "2", memory: "2G" }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }

volumes:
  pgdata:
  redisdata:
